<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

  <div class="sidebar">
    <h3>Library</h3>
    <ul id="songList"></ul>
  </div>

  <div class="main">
    <div class="player-box">

      <h2 id="nowPlaying">No song</h2>

      <input type="range" id="seekBar" min="0" max="100" value="0">
      <div id="timeDisplay">0:00 / 0:00</div>

      <div>
        <button onclick="prev()">⏮</button>

        <!-- 🔥 SINGLE TOGGLE BUTTON -->
        <button id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button onclick="stop()">⏹</button>
        <button onclick="next()">⏭</button>
        <button onclick="setA()">A</button>
        <button onclick="setB()">B</button>
        <button onclick="toggleRepeat()" id="repeatBtn">🔁 All</button>
      </div>

      <div>
        Theme: <input type="color" onchange="changeTheme(this.value)">
      </div>

    </div>
  </div>

  <div class="lyrics">
    <textarea id="lyricsPanel"></textarea>
    <button onclick="saveLyrics()">Save Lyrics</button>
  </div>

</div>

<script src="node_modules/howler/dist/howler.min.js"></script>
<script src="renderer.js"></script>

</body>
</html>
