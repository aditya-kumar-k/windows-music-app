<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>

  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#0f0f14;
      color:white;
    }

    #app {
      display:flex;
      height:100vh;
    }

    .sidebar {
      width:250px;
      background:#17171f;
      padding:10px;
      overflow:auto;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .player-box {
      width:60%;
      text-align:center;
    }

    input[type=range] {
      width:100%;
    }

    button {
      margin:5px;
      padding:6px 10px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover {
      background:#444;
    }

    .lyrics {
  width:320px;
  background:linear-gradient(180deg, #17171f, #111118);
  padding:15px;
  display:flex;
  flex-direction:column;
  border-left:1px solid #2a2a35;
    }

    textarea {
  width:100%;
  flex:1;
  background:#0f0f14;
  color:#e8e8f0;
  border:none;
  outline:none;
  resize:none;
  padding:10px;
  line-height:1.6;
  font-size:13px;
  border-radius:6px;
    }
	
	button {
  border-radius:6px;
}

.lyrics button {
  margin-top:10px;
  background:#8a6cff;
}

.lyrics button:hover {
  background:#6f55ff;
}

li {
  cursor:pointer;
  margin:4px 0;
  transition: all 0.2s ease;
}

li:hover {
  color: #b8aaff;
}

ul {
  padding: 0 0 0 20px;
}
  </style>
</head>

<body>

<div id="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Library</h3>
    <ul id="songList"></ul>
  </div>

  <!-- CENTER -->
  <div class="main">
    <div class="player-box">

      <h2 id="nowPlaying">No song</h2>

      <!-- SEEK BAR -->
      <input type="range" id="seekBar" min="0" max="100" value="0">
	  <div id="timeDisplay" style="font-size:12px; margin-top:5px;">
		0:00 / 0:00
	  </div>

      <!-- CONTROLS -->
      <div>
        <button onclick="prev()">⏮</button>
        <button onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
        <button onclick="stop()">⏹</button>
        <button onclick="next()">⏭</button>
        <button onclick="setA()">A</button>
        <button onclick="setB()">B</button>
      </div>

      <!-- THEME -->
      <div>
        Theme: <input type="color" onchange="changeTheme(this.value)">
      </div>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="lyrics">
    <textarea id="lyricsPanel"></textarea>
    <button onclick="saveLyrics()">Save Lyrics</button>
  </div>

</div>

<script src="node_modules/howler/dist/howler.min.js"></script>

<script>
const fs = require('fs');
const path = require('path');

let songs = [];
let currentIndex = 0;
let sound = null;

let loopA = null;
let loopB = null;

const lyricsFile = path.join(__dirname, "lyrics.json");


// LOAD SONGS
let libraryTree = {};

function buildTree(folder) {
  function scan(dir) {
    const name = path.basename(dir);
    const node = { name, type: "folder", children: [] };

    const files = fs.readdirSync(dir);

    files.forEach(file => {
      const full = path.join(dir, file);
      const stat = fs.statSync(full);

      if (stat.isDirectory()) {
        node.children.push(scan(full));
      } else if (/\.(mp3|wav|m4a|flac)$/i.test(file)) {
        node.children.push({
          name: file,
          path: full,
          type: "file"
        });
      }
    });

    return node;
  }

  libraryTree = scan(folder);
  renderTree(libraryTree);
}


// PLAY
function playSong(i) {
  currentIndex = i;

  if(sound) sound.stop();

  sound = new Howl({
    src:[songs[i].path],
    html5:true
  });

  sound.play();

  document.getElementById("nowPlaying").innerText = songs[i].name;

  loadLyrics();

  startSeek();
}


// CONTROLS
function play(){ if(sound) sound.play(); }
function pause(){ if(sound) sound.pause(); }
function stop(){ if(sound) sound.stop(); }

function next(){ if(currentIndex < songs.length-1) playSong(currentIndex+1); }
function prev(){ if(currentIndex > 0) playSong(currentIndex-1); }


// SEEK BAR
function startSeek() {
  const bar = document.getElementById("seekBar");

  if (window.seekInterval) clearInterval(window.seekInterval);
  window.seekInterval = setInterval(()=>{
    if(sound && sound.playing()){
      let current = sound.seek();
let duration = sound.duration();

let progress = (current / duration) * 100;
bar.value = progress;

// ⏱ UPDATE TIMER
document.getElementById("timeDisplay").innerText =
  formatTime(current) + " / " + formatTime(duration);

      // LOOP
      if(loopA !== null && loopB !== null){
        if(sound.seek() >= loopB){
          sound.seek(loopA);
        }
      }
    }
  },500);
}


// USER SEEK
document.getElementById("seekBar").addEventListener("input", function(){
  if(sound){
    let seekTo = (this.value/100)*sound.duration();
    sound.seek(seekTo);
  }
});


// A-B LOOP
function setA(){
  if(sound){
    loopA = sound.seek();
    console.log("A set at:", formatTime(loopA));

    document.getElementById("nowPlaying").innerText +=
      "  [A: " + formatTime(loopA) + "]";
  }
}
function setB(){
  if(sound){
    loopB = sound.seek();
    console.log("B set at:", formatTime(loopB));

    document.getElementById("nowPlaying").innerText +=
      "  [B: " + formatTime(loopB) + "]";
  }
}

// THEME
function changeTheme(color){
  document.body.style.background = color;
}


// LYRICS
function loadLyrics(){
  try{
    const data = JSON.parse(fs.readFileSync(lyricsFile));
    document.getElementById("lyricsPanel").value =
      data[songs[currentIndex].path] || "";
  }catch{
    document.getElementById("lyricsPanel").value = "";
  }
}

function saveLyrics(){
  let data = {};
  try{
    data = JSON.parse(fs.readFileSync(lyricsFile));
  }catch{}

  data[songs[currentIndex].path] =
    document.getElementById("lyricsPanel").value;

  fs.writeFileSync(lyricsFile, JSON.stringify(data, null, 2));
  alert("Saved ✅");
}


// AUTO LOAD
window.onload = () => {
  buildTree("D:\\\\Music");
};

let currentElement = null;

function renderTree(node, parent = null) {
  const container = parent || document.getElementById("songList");

  if (!parent) container.innerHTML = "";

  const li = document.createElement("li");
  li.textContent = node.name;

  if (node.type === "folder") {
    li.style.fontWeight = "500";

    const ul = document.createElement("ul");
    ul.style.marginLeft = "10px";
    ul.style.display = "none";

    li.onclick = () => {
      ul.style.display = ul.style.display === "none" ? "block" : "none";
    };

    container.appendChild(li);
    container.appendChild(ul);

    node.children.forEach(child => renderTree(child, ul));

  } else {
    li.onclick = () => playSongFromTree(node, li);
    container.appendChild(li);
  }
}

function playSongFromTree(song, element) {

  if (sound) sound.stop();

  sound = new Howl({
    src: [song.path],
    html5: true
  });

  sound.play();

  document.getElementById("nowPlaying").innerText = song.name;

  // 🎧 HIGHLIGHT
  if (currentElement) {
    currentElement.style.color = "white";
  }

  element.style.color = "#8a6cff";
  element.style.fontWeight = "bold";
  currentElement = element;

  loadLyricsByPath(song.path);

  startSeek();
}

function loadLyricsByPath(songPath){
  try{
    const data = JSON.parse(fs.readFileSync(lyricsFile));
    document.getElementById("lyricsPanel").value =
      data[songPath] || "";
  }catch{
    document.getElementById("lyricsPanel").value = "";
  }
}

function formatTime(sec){
  if(!sec) return "0:00";
  let m = Math.floor(sec / 60);
  let s = Math.floor(sec % 60);
  return m + ":" + (s < 10 ? "0"+s : s);
}

document.addEventListener("keydown", (e) => {

  if(e.target.tagName === "TEXTAREA") return; // don't block typing

  switch(e.code){

    case "Space":
      e.preventDefault();
      if(sound && sound.playing()) pause();
      else play();
      break;

    case "ArrowRight":
      if(sound) sound.seek(sound.seek() + 5);
      break;

    case "ArrowLeft":
      if(sound) sound.seek(sound.seek() - 5);
      break;

    case "ArrowUp":
      next();
      break;

    case "ArrowDown":
      prev();
      break;

    case "KeyS":
      stop();
      break;

    case "KeyA":
      setA();
      break;

    case "KeyB":
      setB();
      break;
  }
});
</script>

</body>
</html>
